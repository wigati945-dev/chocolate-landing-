<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan - Choco Boutique</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1005 0%, #110802 100%);
            color: #f5eae0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .latar-bintang {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bintang {
            width: 2px;
            height: 2px;
            background: transparent;
            border-radius: 50%;
            animation: berkedip 3s ease-in-out infinite alternate;
        }

        .bintang-1 {
            box-shadow:
                10vw 20vh #fff, 25vw 15vh rgba(212, 175, 55, 0.6), 80vw 10vh #fff,
                45vw 40vh rgba(212, 175, 55, 0.4), 90vw 35vh #fff, 15vw 70vh #fff,
                65vw 60vh rgba(212, 175, 55, 0.7), 35vw 85vh #fff, 75vw 80vh #fff;
        }

        .bintang-2 {
            box-shadow:
                5vw 45vh rgba(212, 175, 55, 0.5), 55vw 20vh #fff, 70vw 45vh #fff,
                30vw 60vh rgba(212, 175, 55, 0.6), 85vw 65vh #fff, 50vw 80vh #fff,
                20vw 90vh rgba(212, 175, 55, 0.4), 95vw 15vh #fff, 40vw 10vh #fff;
            animation-delay: 1.5s;
        }

        @keyframes berkedip {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .halaman {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
            position: relative;
            z-index: 2;
        }

        .menu-box {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 34px;
        }

        .btn,
        button {
            border: 0;
            background: linear-gradient(45deg, #af851a, #d4af37);
            color: #110802;
            padding: 13px 26px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            display: inline-block;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .btn:hover,
        .btn.aktif,
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
            background: linear-gradient(45deg, #d4af37, #f3e5ab);
        }

        .judul-box {
            text-align: center;
            max-width: 760px;
            margin: 0 auto 32px;
        }

        .judul-box h1 {
            color: #d4af37;
            font-size: clamp(2.2rem, 6vw, 4rem);
            line-height: 1.05;
            margin: 0 0 14px;
            letter-spacing: 2px;
        }

        .judul-box p {
            color: #dcd1c4;
            font-size: 1.08rem;
            line-height: 1.8;
            margin: 0;
        }

        .belanja-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 22px;
            align-items: start;
        }

        .produk-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .produk-card,
        .keranjang-box {
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(212, 175, 55, 0.16);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.22);
        }

        .produk-card {
            min-height: 250px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .produk-card:hover {
            transform: translateY(-6px);
            border-color: rgba(212, 175, 55, 0.5);
            background: rgba(255, 255, 255, 0.07);
        }

        .produk-icon {
            width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            margin-bottom: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #6f3c13);
            color: #140903;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0;
        }

        .produk-card h2 {
            margin: 0 0 10px;
            color: #fff6dc;
            font-size: 1.45rem;
        }

        .harga {
            margin: 0 0 18px;
            color: #d4af37;
            font-size: 1.35rem;
            font-weight: 800;
        }

        .aksi-produk {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-sekunder {
            background: rgba(255, 255, 255, 0.08);
            color: #fff6dc;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-sekunder:hover {
            background: rgba(212, 175, 55, 0.16);
            color: #f3e5ab;
        }

        .keranjang-box {
            padding: 22px;
            position: sticky;
            top: 18px;
        }

        .keranjang-box h2 {
            margin: 0 0 16px;
            color: #d4af37;
            font-size: 1.45rem;
        }

        .keranjang-list {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }

        .item-keranjang {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.14);
        }

        .item-keranjang p {
            margin: 0;
        }

        .nama-item {
            color: #fff6dc;
            font-weight: 700;
        }

        .jumlah-item {
            color: #dcd1c4;
            font-size: 0.95rem;
        }

        .subtotal-item {
            color: #d4af37;
            font-weight: 800;
            white-space: nowrap;
        }

        .kosong {
            color: #dcd1c4;
            line-height: 1.7;
            margin: 0 0 18px;
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(212, 175, 55, 0.24);
            color: #fff6dc;
            font-size: 1.15rem;
            font-weight: 800;
        }

        .checkout-link {
            width: 100%;
            margin-top: 18px;
            text-align: center;
        }

        .animasi-muncul {
            opacity: 0;
            animation: munculKeAtas 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes munculKeAtas {
            from {
                opacity: 0;
                transform: translateY(42px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 880px) {
            .belanja-layout {
                grid-template-columns: 1fr;
            }

            .keranjang-box {
                position: static;
            }
        }

        @media (max-width: 620px) {
            .halaman {
                width: min(100% - 22px, 1120px);
                padding-top: 18px;
            }

            .btn,
            button {
                width: 100%;
                text-align: center;
            }

            .produk-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="latar-bintang">
        <div class="bintang bintang-1"></div>
        <div class="bintang bintang-2"></div>
    </div>

    <main class="halaman animasi-muncul">
        <nav class="menu-box">
            <a href="index.html" class="btn">HOME</a>
            <a href="pemesanan.html" class="btn aktif">BELI SEKARANG</a>
            <a href="produk.html" class="btn">PRODUK</a>
            <a href="kontak.html" class="btn">KONTAK KAMI</a>
        </nav>

        <section class="judul-box">
            <h1>Pemesanan</h1>
            <p>Pilih produk favorit Anda. Keranjang akan tersimpan otomatis, jadi pesanan tetap ada walaupun berpindah halaman.</p>
        </section>

        <section class="belanja-layout">
            <div class="produk-grid" aria-label="Produk yang dapat dipesan">
                <article class="produk-card">
                    <div>
                        <div class="produk-icon">PC</div>
                        <h2>Puding Coklat</h2>
                        <p class="harga">Rp 25.000</p>
                    </div>
                    <div class="aksi-produk">
                        <button type="button" class="tambah-btn" data-id="puding-coklat">Tambah ke Keranjang</button>
                        <button type="button" class="beli-btn btn-sekunder" data-id="puding-coklat">Beli</button>
                    </div>
                </article>

                <article class="produk-card">
                    <div>
                        <div class="produk-icon">EC</div>
                        <h2>Es Krim Coklat</h2>
                        <p class="harga">Rp 22.000</p>
                    </div>
                    <div class="aksi-produk">
                        <button type="button" class="tambah-btn" data-id="es-krim-coklat">Tambah ke Keranjang</button>
                        <button type="button" class="beli-btn btn-sekunder" data-id="es-krim-coklat">Beli</button>
                    </div>
                </article>
            </div>

            <aside class="keranjang-box" aria-label="Ringkasan keranjang">
                <h2>Keranjang</h2>
                <div id="keranjangList" class="keranjang-list"></div>
                <div class="total-box">
                    <span>Total</span>
                    <span id="totalHarga">Rp 0</span>
                </div>
                <a href="checkout.html" class="btn checkout-link">Checkout</a>
            </aside>
        </section>
    </main>

    <script src="assets/cart.js"></script>
    <script>
        const keranjangList = document.getElementById('keranjangList');
        const totalHarga = document.getElementById('totalHarga');

        function tampilkanKeranjang() {
            const keranjang = ambilKeranjang();

            if (keranjang.length === 0) {
                keranjangList.innerHTML = '<p class="kosong">Keranjang masih kosong. Silakan tambahkan produk terlebih dahulu.</p>';
            } else {
                keranjangList.innerHTML = keranjang.map((item) => `
                    <div class="item-keranjang">
                        <div>
                            <p class="nama-item">${item.nama}</p>
                            <p class="jumlah-item">${item.jumlah} x ${formatRupiah(item.harga)}</p>
                        </div>
                        <p class="subtotal-item">${formatRupiah(item.harga * item.jumlah)}</p>
                    </div>
                `).join('');
            }

            totalHarga.textContent = formatRupiah(hitungTotal(keranjang));
        }

        document.querySelectorAll('.tambah-btn').forEach((tombol) => {
            tombol.addEventListener('click', () => {
                tambahKeKeranjang(tombol.dataset.id);
                tampilkanKeranjang();
            });
        });

        document.querySelectorAll('.beli-btn').forEach((tombol) => {
            tombol.addEventListener('click', () => {
                tambahKeKeranjang(tombol.dataset.id);
                window.location.href = 'checkout.html';
            });
        });

        tampilkanKeranjang();
    </script>
</body>
</html>
